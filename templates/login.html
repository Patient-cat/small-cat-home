<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeSight — 登录</title>
<style>
/* ============================================================
   SafeSight Login — Inspired by modern AI tool aesthetics
   Dark gradient + glass card + animated particles
   ============================================================ */
:root {
  --bg: #0a0a10;
  --accent: #00d4aa;
  --accent2: #00a8ff;
  --text: #c8d2dc;
  --text-dim: #5a6a7a;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ---- Animated background ---- */
.bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 30%, rgba(0,212,170,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 70%, rgba(0,168,255,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 20% 50%, rgba(120,80,255,0.03) 0%, transparent 50%);
}

/* Grid lines */
.bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 80% 60% at 50% 40%, black 30%, transparent 70%);
}

/* Floating dots */
.dots {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}
.dot {
  position: absolute;
  width: 3px; height: 3px;
  border-radius: 50%;
  background: var(--accent);
  opacity: 0;
  animation: floatUp linear infinite;
}
.dot:nth-child(1) { left: 15%; animation-duration: 8s; animation-delay: 0s; }
.dot:nth-child(2) { left: 25%; animation-duration: 11s; animation-delay: 1s; }
.dot:nth-child(3) { left: 38%; animation-duration: 9s; animation-delay: 2s; }
.dot:nth-child(4) { left: 52%; animation-duration: 13s; animation-delay: 0.5s; }
.dot:nth-child(5) { left: 65%; animation-duration: 10s; animation-delay: 3s; }
.dot:nth-child(6) { left: 78%; animation-duration: 7s; animation-delay: 1.5s; }
.dot:nth-child(7) { left: 88%; animation-duration: 12s; animation-delay: 2.5s; }
.dot:nth-child(8) { left: 10%; animation-duration: 14s; animation-delay: 4s; }
.dot:nth-child(9) { left: 45%; animation-duration: 8s; animation-delay: 5s; }
.dot:nth-child(10){ left: 70%; animation-duration: 11s; animation-delay: 3.5s; }
.dot:nth-child(11){ left: 92%; animation-duration: 9s; animation-delay: 6s; }
.dot:nth-child(12){ left: 32%; animation-duration: 10s; animation-delay: 4.5s; }

@keyframes floatUp {
  0%   { opacity: 0; transform: translateY(100vh) scale(0); }
  10%  { opacity: 0.8; }
  90%  { opacity: 0.2; }
  100% { opacity: 0; transform: translateY(-10vh) scale(2); }
}

/* ---- Login Card ---- */
.login-wrap {
  position: relative;
  z-index: 1;
  width: 420px;
  max-width: 94vw;
}

.login-card {
  background: rgba(18,20,30,0.8);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 48px 40px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03) inset;
  animation: cardIn 0.6s ease;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Logo */
.logo-area {
  text-align: center;
  margin-bottom: 36px;
}
.logo-img {
  display: block;
  margin: 0 auto 20px;
  width: 100px;
  height: 100px;
  filter: drop-shadow(0 8px 32px rgba(0,212,170,0.15));
}
.logo-sub {
  font-size: 13px;
  color: var(--text-dim);
  margin-top: 6px;
}

/* Form */
.form-group {
  margin-bottom: 20px;
}
.form-label {
  display: block;
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 8px;
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.input-wrap {
  position: relative;
}
.input-wrap .icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 16px;
  opacity: 0.4;
  pointer-events: none;
}
.form-input {
  width: 100%;
  padding: 13px 14px 13px 42px;
  font-size: 15px;
  font-family: var(--font);
  color: #fff;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  outline: none;
  transition: all 0.25s ease;
}
.form-input::placeholder {
  color: rgba(255,255,255,0.2);
}
.form-input:focus {
  border-color: var(--accent);
  background: rgba(0,212,170,0.04);
  box-shadow: 0 0 0 3px rgba(0,212,170,0.08);
}

/* Button */
.btn-login {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  font-family: var(--font);
  font-weight: 600;
  color: #000;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.25s ease;
  margin-top: 8px;
  letter-spacing: 1px;
}
.btn-login:hover {
  box-shadow: 0 8px 32px rgba(0,212,170,0.3);
  transform: translateY(-1px);
}
.btn-login:active {
  transform: scale(0.97);
}

/* Error */
.error-msg {
  text-align: center;
  font-size: 13px;
  color: #ef4444;
  margin-top: 12px;
  min-height: 20px;
  transition: all 0.2s;
}

/* Footer */
.login-footer {
  text-align: center;
  margin-top: 28px;
  font-size: 12px;
  color: var(--text-dim);
}
.login-footer span {
  opacity: 0.5;
}

/* Responsive */
@media (max-width: 480px) {
  .login-card {
    padding: 36px 24px;
    border-radius: 16px;
  }
  .logo-title { font-size: 20px; }
}
</style>
</head>
<body>

<!-- Background -->
<div class="bg"></div>
<div class="dots">
  <span class="dot"></span><span class="dot"></span><span class="dot"></span>
  <span class="dot"></span><span class="dot"></span><span class="dot"></span>
  <span class="dot"></span><span class="dot"></span><span class="dot"></span>
  <span class="dot"></span><span class="dot"></span><span class="dot"></span>
</div>

<!-- Login Card -->
<div class="login-wrap">
  <div class="login-card">
    <div class="logo-area">
      <img src="/static/logo.png" alt="SafeSight" class="logo-img">
      <div class="logo-sub">多模态跌倒监测预警系统</div>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">用户名</label>
        <div class="input-wrap">
          <span class="icon">&#x1F464;</span>
          <input class="form-input" type="text" id="username" placeholder="请输入用户名" autocomplete="username" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">密码</label>
        <div class="input-wrap">
          <span class="icon">&#x1F512;</span>
          <input class="form-input" type="password" id="password" placeholder="请输入密码" autocomplete="current-password" required>
        </div>
      </div>

      <button class="btn-login" type="submit" id="btnSubmit">登 录</button>
      <div class="error-msg" id="errorMsg"></div>
    </form>

    <div class="login-footer">
      <span>SafeSight v2.0 &middot; 广东理工学院</span>
    </div>
  </div>
</div>

<script>
function handleLogin(e) {
  e.preventDefault();
  var btn = document.getElementById('btnSubmit');
  var err = document.getElementById('errorMsg');
  var user = document.getElementById('username').value.trim();
  var pass = document.getElementById('password').value.trim();

  if (!user || !pass) {
    err.textContent = '请输入用户名和密码';
    return;
  }

  btn.textContent = '验证中...';
  btn.style.opacity = '0.7';
  err.textContent = '';

  fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: user, password: pass })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.ok) {
      btn.textContent = '✓ 登录成功';
      btn.style.background = 'linear-gradient(135deg, #22c55e, #00d4aa)';
      setTimeout(function() { window.location.href = d.redirect || '/hall'; }, 400);
    } else {
      btn.textContent = '登 录';
      btn.style.opacity = '1';
      err.textContent = d.error || '登录失败，请重试';
    }
  })
  .catch(function() {
    btn.textContent = '登 录';
    btn.style.opacity = '1';
    err.textContent = '网络错误，请检查服务是否启动';
  });
}

// Auto-focus
document.getElementById('username').focus();
</script>
</body>
</html>
