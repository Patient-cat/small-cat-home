<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人脸注册 - SafeSight</title>
<style>
:root {
  --bg: #0a0e14; --card: #111922; --border: #1e2d3d;
  --accent: #4fc3f7; --green: #4caf50; --yellow: #ff9800; --red: #f44336;
  --text: #c8d8e0; --muted: #5a7a8a;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
body::before { content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0; background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(79,195,247,0.04) 0%, transparent 60%); }

.header { position: sticky; top: 0; z-index: 10; display: flex; align-items: center; justify-content: center; gap: 20px; padding: 12px 24px; background: rgba(17,25,34,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
.header h1 { font-size: 20px; color: var(--accent); font-weight: 600; }
.header a { color: var(--accent); text-decoration: none; font-size: 13px; border: 1px solid var(--accent); padding: 5px 14px; border-radius: 16px; transition: all .2s; }
.header a:hover { background: var(--accent); color: #0a0e14; }

.container { position: relative; z-index: 1; max-width: 520px; margin: 24px auto; padding: 0 16px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 32px 28px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
.card h2 { font-size: 20px; color: var(--accent); margin-bottom: 24px; font-weight: 600; text-align: center; }

.form-row { margin-bottom: 16px; }
.form-row label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
.form-row select, .form-row input { width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); color: var(--text); font-size: 15px; font-family: var(--font); outline: none; transition: border .2s; }
.form-row select:focus, .form-row input:focus { border-color: var(--accent); }

.progress { display: flex; gap: 6px; margin-bottom: 24px; }
.progress .step { flex: 1; text-align: center; padding: 8px 4px; border-radius: 8px; background: var(--bg); border: 1px solid var(--border); font-size: 12px; color: var(--muted); transition: all .2s; }
.progress .step.active { border-color: var(--accent); color: var(--accent); font-weight: 600; }
.progress .step.done { border-color: var(--green); color: var(--green); }

.preview-wrap { position: relative; margin-bottom: 12px; }
.preview-wrap img { width: 100%; border-radius: 10px; border: 2px solid var(--border); background: #000; display: block; min-height: 200px; object-fit: contain; }
.preview-placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 14px; background: rgba(0,0,0,0.6); border-radius: 10px; }
.instruction { text-align: center; font-size: 16px; color: var(--accent); margin-bottom: 12px; font-weight: 600; }
.thumbs { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; min-height: 44px; align-items: center; }
.thumbs img { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; border: 2px solid var(--green); }

.btn-row { display: flex; gap: 10px; margin-top: 14px; }
.btn { font-family: var(--font); font-size: 15px; font-weight: 600; padding: 12px 20px; border-radius: 10px; cursor: pointer; border: none; transition: all .2s; }
.btn:active { transform: scale(0.97); }
.btn-capture { flex: 1; background: var(--accent); color: #000; }
.btn-capture:hover { box-shadow: 0 4px 16px rgba(79,195,247,0.3); }
.btn-capture:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-submit { width: 100%; margin-top: 16px; padding: 14px; font-size: 16px; background: var(--green); color: #fff; }
.btn-submit:hover { box-shadow: 0 4px 16px rgba(76,175,80,0.3); }
.btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

.msg { margin-top: 14px; padding: 12px 16px; border-radius: 10px; font-size: 14px; display: none; text-align: center; }
.msg.ok { display: block; background: rgba(76,175,80,0.1); border: 1px solid var(--green); color: #81c784; }
.msg.err { display: block; background: rgba(244,67,54,0.1); border: 1px solid var(--red); color: #ef9a9a; }

/* Blink detection overlay */
.blink-overlay { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); padding: 8px 18px; border-radius: 20px; font-size: 14px; font-weight: 600; z-index: 5; pointer-events: none; transition: all .3s; }
.blink-overlay.waiting { background: rgba(255,152,0,0.9); color: #000; }
.blink-overlay.detected { background: rgba(76,175,80,0.9); color: #fff; }
.blink-overlay.timeout { background: rgba(244,67,54,0.9); color: #fff; }

@media (max-width: 500px) { .card { padding: 24px 16px; } }
</style>
</head>
<body>

<header class="header">
  <img src="/static/logo.png" alt="SafeSight" style="height:28px;">
  <h1>人脸注册</h1>
  <a href="/">← 返回主页</a>
</header>

<div class="container">
  <div class="card">
    <h2>三步注册 + 活体验证</h2>

    <div class="form-row">
      <label>选择摄像头</label>
      <select id="camSelect" onchange="onCamChange()">
        <option value="">加载中...</option>
      </select>
    </div>

    <div class="form-row">
      <label>老人姓名</label>
      <input type="text" id="name" placeholder="请输入老人姓名" autocomplete="off">
    </div>

    <div class="progress">
      <div class="step active" id="step0Label">0. 活体验证</div>
      <div class="step" id="step1Label">1. 正面</div>
      <div class="step" id="step2Label">2. 稍左转</div>
      <div class="step" id="step3Label">3. 稍右转</div>
    </div>

    <div class="instruction" id="instruction">请先选择摄像头</div>
    <div class="preview-wrap">
      <img id="preview" src="" alt="预览">
      <div class="preview-placeholder" id="placeholder">请先选择摄像头</div>
      <div class="blink-overlay" id="blinkOverlay" style="display:none;"></div>
    </div>
    <div class="thumbs" id="thumbs"></div>

    <div class="btn-row">
      <button class="btn btn-capture" id="btnCapture" onclick="captureStep()" disabled>📷 拍照</button>
    </div>

    <div id="submitArea" style="display:none;">
      <button class="btn btn-submit" id="btnSubmit" onclick="doSubmit()" disabled>
        提 交 注 册（共 <span id="submitCount">0</span> 张）
      </button>
    </div>

    <div id="message" class="msg"></div>
  </div>
</div>

<script>
var currentStep = 0; // 0 = liveness, 1-3 = photos
var captures = [null, null, null, null];
var instructions = [
  '请正对摄像头，眨眼完成验证',
  '请正对摄像头',
  '头部稍向左转',
  '头部稍向右转'
];
var selectedCamId = -1;
var livenessPassed = false;
var blinkCheckTimer = null;
var eyeStates = []; // track eye open/close history

// ---- Camera ----
function loadCameras() {
  fetch('/api/cameras').then(function(r){return r.json()}).then(function(list){
    var sel = document.getElementById('camSelect');
    var usb = (list||[]).filter(function(c){ return c.name.indexOf('USB')!==-1; });
    var others = (list||[]).filter(function(c){ return c.name.indexOf('USB')===-1; });
    var sorted = usb.concat(others);
    sel.innerHTML = '<option value="">-- 选择摄像头 --</option>';
    sorted.forEach(function(c){
      sel.innerHTML += '<option value="'+c.id+'">'+esc(c.name)+' (ID:'+c.id+')</option>';
    });
    if (usb.length > 0) { sel.value = usb[0].id; onCamChange(); }
  });
}

function onCamChange() {
  var val = document.getElementById('camSelect').value;
  if (!val) {
    document.getElementById('preview').src = '';
    document.getElementById('placeholder').style.display = 'flex';
    document.getElementById('btnCapture').disabled = true;
    stopBlinkCheck();
    return;
  }
  selectedCamId = parseInt(val);
  fetch('/api/camera/'+selectedCamId+'/toggle', {method:'POST'}).then(function(r){return r.json()}).then(function(d){
    if (!d.enabled) return fetch('/api/camera/'+selectedCamId+'/toggle', {method:'POST'});
  }).then(function(){
    var img = document.getElementById('preview');
    img.src = '/video_feed/' + selectedCamId + '?t=' + Date.now();
    document.getElementById('placeholder').style.display = 'none';
    if (currentStep === 0 && !livenessPassed) {
      startBlinkCheck();
    } else {
      document.getElementById('btnCapture').disabled = false;
    }
  });
}

// ---- Liveness / Blink Detection ----
function startBlinkCheck() {
  document.getElementById('btnCapture').disabled = true;
  var overlay = document.getElementById('blinkOverlay');
  overlay.style.display = 'block';
  overlay.className = 'blink-overlay waiting';
  overlay.textContent = '👁️ 请眨眼...';
  eyeStates = [];

  var canvas = document.createElement('canvas');
  canvas.width = 320; canvas.height = 240;
  var ctx = canvas.getContext('2d');
  var img = document.getElementById('preview');
  var attempts = 0;
  var maxAttempts = 50; // ~10 seconds at 200ms interval

  blinkCheckTimer = setInterval(async function() {
    attempts++;
    if (attempts > maxAttempts) {
      stopBlinkCheck();
      overlay.className = 'blink-overlay timeout';
      overlay.textContent = '⚠️ 未检测到眨眼，点击拍照跳过';
      document.getElementById('btnCapture').disabled = false;
      return;
    }

    try {
      // Fetch a frame from the camera
      var resp = await fetch('/capture_frame?cam_id=' + selectedCamId);
      if (!resp.ok) return;
      var blob = await resp.blob();
      var bmp = await createImageBitmap(blob);
      ctx.drawImage(bmp, 0, 0, canvas.width, canvas.height);

      // Analyze eye region brightness (simplified blink detection)
      // The eye region is roughly at 40-50% height, 30-70% width
      var eyeData = ctx.getImageData(
        Math.floor(canvas.width * 0.3), Math.floor(canvas.height * 0.35),
        Math.floor(canvas.width * 0.4), Math.floor(canvas.height * 0.2)
      );

      // Calculate average brightness of eye region
      var sum = 0;
      var pixels = eyeData.data;
      for (var i = 0; i < pixels.length; i += 4) {
        sum += (pixels[i] + pixels[i+1] + pixels[i+2]) / 3;
      }
      var avgBrightness = sum / (pixels.length / 4);

      // Blink = brightness drops significantly then recovers
      eyeStates.push(avgBrightness);
      if (eyeStates.length > 10) eyeStates.shift();

      // Detect blink pattern: high -> low -> high
      if (eyeStates.length >= 6) {
        var recent = eyeStates.slice(-6);
        var maxB = Math.max.apply(null, recent);
        var minB = Math.min.apply(null, recent);
        var drop = maxB - minB;

        // Significant brightness drop = blink
        if (drop > 15 && recent[0] > minB + 10 && recent[recent.length-1] > minB + 10) {
          // Blink detected!
          stopBlinkCheck();
          overlay.className = 'blink-overlay detected';
          overlay.textContent = '✅ 活体验证通过！';
          livenessPassed = true;
          document.getElementById('btnCapture').disabled = false;
          document.getElementById('step0Label').classList.add('done');
          setTimeout(function(){ overlay.style.display = 'none'; }, 1500);
          return;
        }
      }

      // Update hint
      if (attempts % 10 === 0) {
        overlay.textContent = '👁️ 请眨眼... (' + Math.ceil((maxAttempts - attempts) / 5) + 's)';
      }
    } catch(e) {}
  }, 200);
}

function stopBlinkCheck() {
  if (blinkCheckTimer) { clearInterval(blinkCheckTimer); blinkCheckTimer = null; }
}

// ---- Wizard ----
function updateUI() {
  for (var i=0; i<=3; i++) {
    var el = document.getElementById('step'+i+'Label');
    if (!el) continue;
    el.classList.remove('active','done');
    if (i === 0 && livenessPassed) el.classList.add('done');
    else if (i > 0 && captures[i]) el.classList.add('done');
    else if (i === currentStep) el.classList.add('active');
  }
  document.getElementById('instruction').textContent =
    currentStep <= 3 ? instructions[currentStep] + (captures[currentStep] ? ' ✓' : '') : '';

  var html = '';
  for (var i=1; i<=3; i++) {
    if (captures[i]) html += '<img src="'+URL.createObjectURL(captures[i])+'" title="步骤'+i+'">';
  }
  document.getElementById('thumbs').innerHTML = html;

  var btn = document.getElementById('btnCapture');
  if (currentStep > 3) {
    btn.style.display = 'none';
    document.getElementById('submitArea').style.display = 'block';
    document.getElementById('submitCount').textContent =
      captures.filter(function(_,i){return i>0&&captures[i]}).length;
  } else {
    btn.style.display = 'block';
    if (currentStep === 0) {
      btn.textContent = livenessPassed ? '▶ 下一步' : '⏭ 跳过验证';
    } else {
      btn.textContent = captures[currentStep] ? '📷 重拍' : '📷 拍照';
    }
    document.getElementById('submitArea').style.display = 'none';
  }
}

async function captureStep() {
  var name = document.getElementById('name').value.trim();
  if (!name) { alert('请先输入姓名'); return; }
  if (selectedCamId < 0) { alert('请先选择摄像头'); return; }

  // Step 0: liveness — just advance
  if (currentStep === 0) {
    currentStep = 1;
    updateUI();
    return;
  }

  try {
    var resp = await fetch('/capture_frame?cam_id='+selectedCamId);
    if (!resp.ok) { alert('抓取失败'); return; }
    var blob = await resp.blob();
    captures[currentStep] = blob;
    currentStep++;
    updateUI();
  } catch(err) { alert('抓取失败: '+err.message); }
}

async function doSubmit() {
  var name = document.getElementById('name').value.trim();
  if (!name) { alert('请输入姓名'); return; }
  var msg = document.getElementById('message');
  msg.className = 'msg'; msg.style.display = 'none';
  var btn = document.getElementById('btnSubmit');
  btn.disabled = true; btn.textContent = '提交中...';

  var fd = new FormData();
  fd.append('name', name);
  for (var i=1; i<=3; i++) {
    if (captures[i]) fd.append('photo', captures[i], 'step'+i+'.jpg');
  }
  // Append liveness verification status
  fd.append('live_verified', livenessPassed ? 'true' : 'false');

  try {
    var resp = await fetch('/register', {method:'POST', body:fd});
    var data = await resp.json();
    if (data.ok) {
      msg.className = 'msg ok'; msg.textContent = data.message + (livenessPassed ? ' (活体验证通过)' : '');
      document.getElementById('name').value = '';
      for (var i=1; i<=3; i++) captures[i]=null;
      livenessPassed = false;
      currentStep=0; updateUI();
    } else {
      msg.className = 'msg err'; msg.textContent = data.error;
    }
    msg.style.display = 'block';
  } catch(err) {
    msg.className = 'msg err'; msg.textContent = '网络错误: '+err.message;
    msg.style.display = 'block';
  }
  btn.disabled = false; btn.textContent = '提 交 注 册';
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

loadCameras();
updateUI();
</script>
</body>
</html>
