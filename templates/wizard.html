<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeSight — 初始设置</title>
<style>
:root {
  --bg: #0a0a10;
  --accent: #00d4aa;
  --accent2: #00a8ff;
  --text: #c8d2dc;
  --text-dim: #5a6a7a;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --danger: #ff4757;
  --warning: #ffa502;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}
.bg {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 30%, rgba(0,212,170,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 70%, rgba(0,168,255,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 20% 50%, rgba(120,80,255,0.03) 0%, transparent 50%);
}

.wizard-wrap { position: relative; z-index: 1; width: 540px; max-width: 96vw; }
.wizard-card {
  background: rgba(18,20,30,0.85);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 40px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03) inset;
  animation: cardIn 0.5s ease;
}
@keyframes cardIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

.steps { display: flex; justify-content: center; gap: 8px; margin-bottom: 32px; }
.step-dot {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700;
  background: rgba(255,255,255,0.04);
  border: 2px solid rgba(255,255,255,0.1);
  color: var(--text-dim);
  transition: all 0.3s ease;
}
.step-dot.active { border-color: var(--accent); color: var(--accent); background: rgba(0,212,170,0.1); }
.step-dot.done { border-color: var(--accent); background: var(--accent); color: #000; }
.step-line { width: 28px; height: 2px; background: rgba(255,255,255,0.08); align-self: center; border-radius: 1px; }
.step-line.done { background: var(--accent); }

.step-content { display: none; animation: fadeIn 0.35s ease; }
.step-content.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }

.step-title { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 8px; }
.step-desc { font-size: 13px; color: var(--text-dim); text-align: center; margin-bottom: 28px; line-height: 1.6; }

.logo-area { text-align: center; margin-bottom: 24px; }
.logo-img { width: 80px; height: 80px; filter: drop-shadow(0 8px 32px rgba(0,212,170,0.15)); }

.form-group { margin-bottom: 18px; }
.form-label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 7px; font-weight: 500; letter-spacing: 0.5px; }
.form-input {
  width: 100%; padding: 12px 14px; font-size: 15px; font-family: var(--font); color: #fff;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px; outline: none;
  transition: all 0.25s ease;
}
.form-input:focus { border-color: var(--accent); background: rgba(0,212,170,0.04); box-shadow: 0 0 0 3px rgba(0,212,170,0.08); }
.form-input:disabled { opacity: 0.5; cursor: not-allowed; }

.btn {
  padding: 12px 28px; font-size: 15px; font-family: var(--font); font-weight: 600;
  border: none; border-radius: 10px; cursor: pointer; transition: all 0.25s ease; letter-spacing: 0.5px;
}
.btn-primary { color: #000; background: linear-gradient(135deg, var(--accent), var(--accent2)); }
.btn-primary:hover { box-shadow: 0 6px 24px rgba(0,212,170,0.3); transform: translateY(-1px); }
.btn-secondary { color: var(--text); background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); }
.btn-secondary:hover { background: rgba(255,255,255,0.1); }
.btn-block { width: 100%; }
.btn-row { display: flex; gap: 12px; margin-top: 24px; }
.btn-row .btn { flex: 1; }

.error-msg { color: var(--danger); font-size: 13px; text-align: center; margin-top: 12px; min-height: 20px; }
.success-msg { color: var(--accent); font-size: 13px; text-align: center; margin-top: 12px; }

.cam-list { max-height: 200px; overflow-y: auto; margin: 12px 0; }
.cam-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; margin-bottom: 8px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
}
.cam-item .cam-icon { font-size: 18px; }
.cam-item .cam-name { flex: 1; font-size: 14px; }
.cam-item .cam-status { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
.cam-item .cam-status.ok { background: rgba(0,212,170,0.15); color: var(--accent); }

.skip-link { text-align: center; margin-top: 20px; }
.skip-link a { color: var(--text-dim); font-size: 13px; text-decoration: none; cursor: pointer; }
.skip-link a:hover { color: var(--accent); }

.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="bg"></div>

<div class="wizard-wrap">
  <div class="wizard-card">
    <div class="steps">
      <div class="step-dot active" id="dot1">1</div>
      <div class="step-line" id="line1"></div>
      <div class="step-dot" id="dot2">2</div>
      <div class="step-line" id="line2"></div>
      <div class="step-dot" id="dot3">3</div>
    </div>

    <!-- Step 1: Welcome -->
    <div class="step-content active" id="step1">
      <div class="logo-area">
        <img class="logo-img" src="/static/logo.png" alt="SafeSight" onerror="this.style.display='none'">
      </div>
      <div class="step-title">欢迎使用 SafeSight</div>
      <div class="step-desc">
        多模态 AI 跌倒监测预警系统<br>
        我们将引导您完成初始设置，只需 1 分钟。
      </div>
      <button class="btn btn-primary btn-block" onclick="nextStep()" style="margin-top:12px">开始设置</button>
    </div>

    <!-- Step 2: Change Admin Password -->
    <div class="step-content" id="step2">
      <div class="step-title">创建管理员密码</div>
      <div class="step-desc">默认用户名 admin，请设置一个新的安全密码。</div>
      <div class="form-group">
        <label class="form-label">用户名</label>
        <input class="form-input" value="admin" disabled>
      </div>
      <div class="form-group">
        <label class="form-label">新密码</label>
        <input class="form-input" type="password" id="adminPass" placeholder="至少 6 位字符" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label class="form-label">确认密码</label>
        <input class="form-input" type="password" id="adminPass2" placeholder="再次输入密码">
      </div>
      <div class="error-msg" id="step2Err"></div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="prevStep()">上一步</button>
        <button class="btn btn-primary" onclick="setupAdmin()">下一步</button>
      </div>
    </div>

    <!-- Step 3: Complete -->
    <div class="step-content" id="step3">
      <div class="step-title">设置完成</div>
      <div class="step-desc">一切就绪！您现在可以开始使用 SafeSight。</div>
      <div style="margin:20px 0;text-align:center;font-size:48px;">&#10003;</div>
      <div class="error-msg" id="step3Err"></div>
      <button class="btn btn-primary btn-block" onclick="completeSetup()" style="margin-top:12px">
        <span id="completeSpinner" style="display:none" class="spinner"></span>进入监控大厅
      </button>
    </div>
  </div>
</div>

<script>
let currentStep = 1;

function updateDots(n) {
  for (let i = 1; i <= 3; i++) {
    const dot = document.getElementById('dot' + i);
    dot.classList.remove('active', 'done');
    if (i < n) dot.classList.add('done');
    if (i === n) dot.classList.add('active');
    if (i < 3) {
      const line = document.getElementById('line' + i);
      line.classList.toggle('done', i < n);
    }
  }
}

function showStep(n) {
  document.getElementById('step' + currentStep).classList.remove('active');
  document.getElementById('step' + n).classList.add('active');
  currentStep = n;
  updateDots(n);
}

function nextStep() { if (currentStep < 3) showStep(currentStep + 1); }
function prevStep() { if (currentStep > 1) showStep(currentStep - 1); }

async function setupAdmin() {
  const pw = document.getElementById('adminPass').value;
  const pw2 = document.getElementById('adminPass2').value;
  const err = document.getElementById('step2Err');
  err.textContent = '';
  if (pw.length < 6) { err.textContent = '密码长度不能少于6位'; return; }
  if (pw !== pw2) { err.textContent = '两次密码不一致'; return; }
  try {
    const resp = await fetch('/api/setup/admin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    });
    const data = await resp.json();
    if (data.ok) { nextStep(); } else { err.textContent = data.error || '修改失败'; }
  } catch (e) { err.textContent = '网络错误，请重试'; }
}

async function completeSetup() {
  const btn = document.querySelector('#step3 .btn-primary');
  const spinner = document.getElementById('completeSpinner');
  const err = document.getElementById('step3Err');
  btn.disabled = true; spinner.style.display = 'inline-block'; err.textContent = '';
  try {
    const resp = await fetch('/api/setup/complete', { method: 'POST' });
    const data = await resp.json();
    if (data.ok) {
      window.location.href = '/hall';
    } else {
      err.textContent = data.error || '操作失败';
      btn.disabled = false; spinner.style.display = 'none';
    }
  } catch (e) { err.textContent = '网络错误'; btn.disabled = false; spinner.style.display = 'none'; }
}
</script>
</body>
</html>
