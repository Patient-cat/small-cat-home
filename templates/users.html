<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - SafeSight</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: #0f1923; color: #e0e0e0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        header {
            width: 100%; padding: 16px 20px; background: #1a2d3d;
            box-shadow: 0 2px 12px rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center; gap: 20px;
        }
        header h1 { font-size: 22px; color: #4fc3f7; font-weight: 400; }
        .nav-link {
            color: #4fc3f7; text-decoration: none; font-size: 14px;
            border: 1px solid #4fc3f7; padding: 6px 15px; border-radius: 16px;
        }
        .nav-link:hover { background: #4fc3f7; color: #0f1923; }

        .container { max-width: 800px; width: 100%; margin-top: 20px; padding: 0 16px; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .toolbar .count { font-size: 14px; color: #a0c4d0; }

        table {
            width: 100%; border-collapse: collapse;
            background: #1a2d3d; border-radius: 10px; overflow: hidden;
        }
        th, td {
            padding: 12px 16px; text-align: left;
            border-bottom: 1px solid #2a4a5c; font-size: 14px;
        }
        th { color: #4fc3f7; font-weight: 500; background: rgba(0,0,0,0.2); }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(79,195,247,0.04); }

        .badge {
            display: inline-block; padding: 2px 10px; border-radius: 10px;
            font-size: 12px; font-weight: bold;
        }
        .badge.admin { background: #4fc3f7; color: #0f1923; }
        .badge.user { background: #2a4a5c; color: #a0c4d0; }
        .badge.active { background: #1b3a2a; color: #81c784; }
        .badge.inactive { background: #3a1b1b; color: #ef9a9a; }
        .badge.you { background: transparent; border: 1px solid #4fc3f7; color: #4fc3f7; margin-left: 6px; }

        .btn {
            padding: 5px 14px; font-size: 13px; background: transparent;
            border-radius: 16px; cursor: pointer; transition: all 0.2s;
            font-family: inherit;
        }
        .btn-danger {
            border: 1px solid #c62828; color: #ef5350;
        }
        .btn-danger:hover { background: #c62828; color: #fff; }
        .btn-toggle {
            border: 1px solid #ff9800; color: #ff9800;
        }
        .btn-toggle:hover { background: #ff9800; color: #0f1923; }
        .btn-toggle.enable {
            border: 1px solid #4caf50; color: #81c784;
        }
        .btn-toggle.enable:hover { background: #4caf50; color: #0f1923; }

        .empty {
            text-align: center; padding: 80px 20px; color: #5a7a8a; font-size: 16px;
        }

        .toast {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            padding: 10px 24px; border-radius: 8px; font-size: 14px;
            z-index: 9999; display: none;
        }
        .toast.success { display: block; background: #1b3a2a; border: 1px solid #2e7d32; color: #81c784; }
        .toast.error { display: block; background: #3a1b1b; border: 1px solid #c62828; color: #ef9a9a; }
    </style>
</head>
<body>

<header>
    <img src="/static/logo.png" alt="SafeSight" style="height:28px;">
    <h1>用户管理</h1>
    <a href="/" class="nav-link">← 返回主页</a>
    <a href="/hall" class="nav-link">监控大厅</a>
</header>

<div class="container">
    <div class="toolbar">
        <span class="count" id="countText">加载中...</span>
    </div>
    <div id="content"></div>
</div>

<div id="toast" class="toast"></div>

<script>
var currentUserId = null;

function showToast(msg, type) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type;
    setTimeout(function() { t.className = 'toast'; }, 3000);
}

function loadUsers() {
    fetch('/api/users')
    .then(function(r) { return r.json(); })
    .then(function(d) {
        if (!d.ok) { showToast(d.error || '加载失败', 'error'); return; }
        currentUserId = d.current_user_id;
        document.getElementById('countText').textContent = '共 ' + d.users.length + ' 个用户';
        render(d.users);
    })
    .catch(function() {
        document.getElementById('content').innerHTML =
            '<div class="empty">⚠️ 无法连接服务器</div>';
    });
}

function render(users) {
    var html = '<table><thead><tr>' +
        '<th>用户名</th><th>角色</th><th>状态</th><th>注册时间</th><th>操作</th>' +
        '</tr></thead><tbody>';

    users.forEach(function(u) {
        var isMe = u.id === currentUserId;
        var roleBadge = u.role === 'admin'
            ? '<span class="badge admin">管理员</span>'
            : '<span class="badge user">普通用户</span>';
        var statusBadge = u.is_active
            ? '<span class="badge active">正常</span>'
            : '<span class="badge inactive">已禁用</span>';
        var youTag = isMe ? '<span class="badge you">我</span>' : '';

        var actions = '';
        if (!isMe) {
            var toggleClass = u.is_active ? 'btn-toggle' : 'btn-toggle enable';
            var toggleLabel = u.is_active ? '禁用' : '启用';
            actions = '<button class="btn ' + toggleClass + '" onclick="toggleUser(' + u.id + ')">' + toggleLabel + '</button> ' +
                '<button class="btn btn-danger" onclick="deleteUser(' + u.id + ', \'' + escapeHtml(u.username) + '\')">删除</button>';
        }

        html += '<tr>' +
            '<td><strong>' + escapeHtml(u.username) + '</strong>' + youTag + '</td>' +
            '<td>' + roleBadge + '</td>' +
            '<td>' + statusBadge + '</td>' +
            '<td style="color:#7a9aaa;font-size:13px;">' + escapeHtml(u.created_at || '') + '</td>' +
            '<td>' + actions + '</td>' +
            '</tr>';
    });

    html += '</tbody></table>';
    document.getElementById('content').innerHTML = html;
}

function escapeHtml(s) {
    return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function toggleUser(uid) {
    if (!confirm('确定要切换此用户的启用/禁用状态吗？')) return;
    fetch('/api/users/' + uid + '/toggle', { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function(d) {
        if (d.ok) { showToast(d.message, 'success'); loadUsers(); }
        else { showToast(d.error || '操作失败', 'error'); }
    })
    .catch(function() { showToast('网络错误', 'error'); });
}

function deleteUser(uid, name) {
    if (!confirm('确定要删除用户「' + name + '」吗？此操作不可撤销。')) return;
    fetch('/api/users/' + uid, { method: 'DELETE' })
    .then(function(r) { return r.json(); })
    .then(function(d) {
        if (d.ok) { showToast(d.message, 'success'); loadUsers(); }
        else { showToast(d.error || '删除失败', 'error'); }
    })
    .catch(function() { showToast('网络错误', 'error'); });
}

document.addEventListener('DOMContentLoaded', loadUsers);
</script>
</body>
</html>
