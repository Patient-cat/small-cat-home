<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - SafeSight</title>
    <link rel="stylesheet" href="/static/common.css">
    <style>
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .toolbar .count { font-size: 14px; color: var(--text-dim); }
        table {
            width: 100%; border-collapse: collapse;
            background: var(--surface); border-radius: var(--radius); overflow: hidden;
        }
        th, td {
            padding: 12px 16px; text-align: left;
            border-bottom: 1px solid var(--border); font-size: 14px;
        }
        th { color: var(--accent); font-weight: 500; background: rgba(0,0,0,0.2); }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(0,212,170,0.04); }
        .badge.admin { background: var(--accent); color: var(--bg); }
        .badge.user { background: var(--border); color: var(--text-dim); }
        .badge.active { background: rgba(34,197,94,0.15); color: var(--green); }
        .badge.inactive { background: rgba(239,68,68,0.15); color: var(--red); }
        .badge.you { background: transparent; border: 1px solid var(--accent); color: var(--accent); margin-left: 6px; }
        .btn {
            padding: 5px 14px; font-size: 13px; background: transparent;
            border-radius: 16px; cursor: pointer; transition: all 0.2s;
            font-family: inherit;
        }
        .btn-danger { border: 1px solid var(--red); color: var(--red); }
        .btn-danger:hover { background: var(--red); color: #fff; }
        .btn-toggle { border: 1px solid var(--yellow); color: var(--yellow); }
        .btn-toggle:hover { background: var(--yellow); color: var(--bg); }
        .btn-toggle.enable { border: 1px solid var(--green); color: var(--green); }
        .btn-toggle.enable:hover { background: var(--green); color: var(--bg); }
        .empty { text-align: center; padding: 80px 20px; color: var(--text-dim); font-size: 16px; }
        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 10px 24px; border-radius: 8px; font-size: 14px;
            z-index: 9999; display: none;
        }
        .toast.success { display: block; background: rgba(34,197,94,0.15); border: 1px solid var(--green); color: var(--green); }
        .toast.error { display: block; background: rgba(239,68,68,0.15); border: 1px solid var(--red); color: var(--red); }
    </style>
</head>
<body>

<header class="header">
    <div class="header-center">
        <img src="/static/logo.png" alt="SafeSight" style="height:28px;">
        <h1>用户管理</h1>
    </div>
    <div class="header-right">
        <a href="/" class="nav-link">← 返回主页</a>
        <a href="/hall" class="nav-link">监控大厅</a>
    </div>
</header>

<div class="container">
    <div class="toolbar">
        <span class="count" id="countText">加载中...</span>
    </div>
    <div id="content"></div>
</div>

<div id="toast" class="toast"></div>

<script>
var currentUserId = null;

function showToast(msg, type) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type;
    setTimeout(function() { t.className = 'toast'; }, 3000);
}

function loadUsers() {
    fetch('/api/users')
    .then(function(r) { return r.json(); })
    .then(function(d) {
        if (!d.ok) { showToast(d.error || '加载失败', 'error'); return; }
        currentUserId = d.current_user_id;
        document.getElementById('countText').textContent = '共 ' + d.users.length + ' 个用户';
        render(d.users);
    })
    .catch(function() {
        document.getElementById('content').innerHTML =
            '<div class="empty">⚠️ 无法连接服务器</div>';
    });
}

function render(users) {
    var html = '<table><thead><tr>' +
        '<th>用户名</th><th>角色</th><th>状态</th><th>注册时间</th><th>操作</th>' +
        '</tr></thead><tbody>';

    users.forEach(function(u) {
        var isMe = u.id === currentUserId;
        var roleBadge = u.role === 'admin'
            ? '<span class="badge admin">管理员</span>'
            : '<span class="badge user">普通用户</span>';
        var statusBadge = u.is_active
            ? '<span class="badge active">正常</span>'
            : '<span class="badge inactive">已禁用</span>';
        var youTag = isMe ? '<span class="badge you">我</span>' : '';

        var actions = '';
        if (!isMe) {
            var toggleClass = u.is_active ? 'btn-toggle' : 'btn-toggle enable';
            var toggleLabel = u.is_active ? '禁用' : '启用';
            actions = '<button class="btn ' + toggleClass + '" onclick="toggleUser(' + u.id + ')">' + toggleLabel + '</button> ' +
                '<button class="btn btn-danger" onclick="deleteUser(' + u.id + ', \'' + escapeHtml(u.username) + '\')">删除</button>';
        }

        html += '<tr>' +
            '<td><strong>' + escapeHtml(u.username) + '</strong>' + youTag + '</td>' +
            '<td>' + roleBadge + '</td>' +
            '<td>' + statusBadge + '</td>' +
            '<td style="color:#7a9aaa;font-size:13px;">' + escapeHtml(u.created_at || '') + '</td>' +
            '<td>' + actions + '</td>' +
            '</tr>';
    });

    html += '</tbody></table>';
    document.getElementById('content').innerHTML = html;
}

function escapeHtml(s) {
    return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function toggleUser(uid) {
    if (!confirm('确定要切换此用户的启用/禁用状态吗？')) return;
    fetch('/api/users/' + uid + '/toggle', { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function(d) {
        if (d.ok) { showToast(d.message, 'success'); loadUsers(); }
        else { showToast(d.error || '操作失败', 'error'); }
    })
    .catch(function() { showToast('网络错误', 'error'); });
}

function deleteUser(uid, name) {
    if (!confirm('确定要删除用户「' + name + '」吗？此操作不可撤销。')) return;
    fetch('/api/users/' + uid, { method: 'DELETE' })
    .then(function(r) { return r.json(); })
    .then(function(d) {
        if (d.ok) { showToast(d.message, 'success'); loadUsers(); }
        else { showToast(d.error || '删除失败', 'error'); }
    })
    .catch(function() { showToast('网络错误', 'error'); });
}

document.addEventListener('DOMContentLoaded', loadUsers);
</script>
</body>
</html>
